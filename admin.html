<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaceTea Admin</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #222639;
        --border: #2d3148;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #2d6a4f;
        --primary-light: #40916c;
        --accent: #d4a373;
        --danger: #ef4444;
        --success: #22c55e;
        --warn: #f59e0b;
        --radius: 8px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
      a { color: var(--accent); }
      img { display: block; }

      /* ---- Login ---- */
      .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center; }
      .login-card h1 { font-size: 1.6rem; margin-bottom: 0.4rem; }
      .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
      .login-card input { width: 100%; padding: 0.7rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 1rem; margin-bottom: 0.8rem; }
      .login-card input:focus { outline: none; border-color: var(--primary-light); }
      .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.4rem; }

      /* ---- Buttons ---- */
      .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border: none; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
      .btn:hover { opacity: 0.88; transform: translateY(-1px); }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
      .btn-primary { background: var(--primary); color: #fff; }
      .btn-accent { background: var(--accent); color: #1a1200; }
      .btn-danger { background: var(--danger); color: #fff; }
      .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
      .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
      .btn-block { width: 100%; justify-content: center; }

      /* ---- Header ---- */
      .admin-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
      .admin-header .logo { font-size: 1.15rem; font-weight: 800; color: var(--primary-light); }
      .admin-header .header-right { display: flex; align-items: center; gap: 1rem; }
      .admin-header .store-link { font-size: 0.8rem; color: var(--muted); }
      .admin-header .store-link:hover { color: var(--text); }

      /* ---- Tabs ---- */
      .tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 0; padding: 0 1.5rem; }
      .tab-btn { padding: 0.85rem 1.2rem; background: none; border: none; color: var(--muted); font-size: 0.88rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
      .tab-btn:hover { color: var(--text); }
      .tab-btn.active { color: var(--primary-light); border-bottom-color: var(--primary-light); }

      /* ---- Main content ---- */
      .tab-content { display: none; padding: 1.5rem; }
      .tab-content.active { display: block; }

      /* ---- Search bar ---- */
      .search-row { display: flex; gap: 0.6rem; margin-bottom: 1.5rem; }
      .search-row input { flex: 1; padding: 0.65rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.95rem; }
      .search-row input:focus { outline: none; border-color: var(--primary-light); }

      /* ---- CJ Grid ---- */
      .cj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
      .cj-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
      .cj-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--surface2); }
      .cj-card .cj-card-body { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
      .cj-card h3 { font-size: 0.82rem; line-height: 1.3; }
      .cj-card .cj-price { font-size: 0.78rem; color: var(--accent); font-weight: 700; }
      .cj-card .cj-cat { font-size: 0.72rem; color: var(--muted); }
      .cj-card select { width: 100%; padding: 0.35rem 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.75rem; margin-top: auto; margin-bottom: 0.4rem; }
      .no-results { color: var(--muted); text-align: center; padding: 3rem; grid-column: 1/-1; }
      .pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 1.2rem; justify-content: center; }

      /* ---- Products table ---- */
      .products-table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
      th { background: var(--surface2); color: var(--muted); font-weight: 600; text-align: left; padding: 0.6rem 0.75rem; white-space: nowrap; border-bottom: 1px solid var(--border); }
      td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
      tr:hover td { background: var(--surface2); }
      .prod-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: var(--surface2); }
      .prod-emoji { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; background: var(--surface2); border-radius: 6px; }
      .badge-mapped { background: #14532d; color: #86efac; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; white-space: nowrap; }
      .badge-unmapped { background: #451a03; color: #fed7aa; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; white-space: nowrap; }
      .badge-inactive { background: #1e1b2e; color: #a5b4fc; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; white-space: nowrap; }
      .table-input { width: 100%; padding: 0.35rem 0.5rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.78rem; min-width: 140px; }
      .table-input:focus { outline: none; border-color: var(--primary-light); }
      .actions-cell { display: flex; gap: 0.4rem; white-space: nowrap; }

      /* ---- Toast ---- */
      #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.2rem; border-radius: var(--radius); font-size: 0.88rem; font-weight: 600; z-index: 9999; transform: translateY(80px); opacity: 0; transition: transform 0.25s, opacity 0.25s; pointer-events: none; }
      #toast.show { transform: translateY(0); opacity: 1; }
      #toast.success { background: #14532d; color: #86efac; }
      #toast.error { background: #450a0a; color: #fca5a5; }

      /* ---- Modal ---- */
      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
      .modal-overlay.open { display: flex; }
      .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
      .modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
      .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .modal-grid .full { grid-column: 1/-1; }
      .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
      .field input, .field select, .field textarea { width: 100%; padding: 0.55rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.88rem; }
      .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary-light); }
      .field textarea { min-height: 80px; resize: vertical; }
      .modal-cj-preview { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.75rem; background: var(--surface2); border-radius: var(--radius); margin-bottom: 1rem; }
      .modal-cj-preview img { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
      .modal-cj-preview .preview-info { flex: 1; font-size: 0.8rem; }
      .modal-cj-preview .preview-info strong { display: block; margin-bottom: 0.2rem; }
      .modal-footer { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1rem; }
      .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
      .section-head h2 { font-size: 1rem; }
      .loading { color: var(--muted); text-align: center; padding: 2rem; }
    </style>
  </head>
  <body>

    <!-- Login -->
    <div id="loginWrap" class="login-wrap">
      <div class="login-card">
        <h1>🍵 FaceTea Admin</h1>
        <p>Sign in to manage products and CJ connections.</p>
        <input type="password" id="passwordInput" placeholder="Admin password" autocomplete="current-password" />
        <button class="btn btn-primary btn-block" onclick="login()">Sign In</button>
        <p class="login-error" id="loginError" style="display:none">Incorrect password — try again.</p>
      </div>
    </div>

    <!-- Admin panel -->
    <div id="adminWrap" style="display:none">
      <header class="admin-header">
        <span class="logo">🍵 FaceTea Admin</span>
        <div class="header-right">
          <a href="https://facetea.org" target="_blank" class="store-link">↗ View store</a>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
        </div>
      </header>

      <nav class="tabs">
        <button class="tab-btn active" onclick="showTab('cj')">🔍 Search CJ Catalog</button>
        <button class="tab-btn" onclick="showTab('products')">📦 My Products</button>
      </nav>

      <!-- CJ Search tab -->
      <div id="tabCj" class="tab-content active">
        <div class="search-row">
          <input type="text" id="cjSearchInput" placeholder="Search CJ catalog (e.g. 'green tea serum', 'face roller', 'jade gua sha')" onkeydown="if(event.key==='Enter')searchCJ(1)" />
          <button class="btn btn-primary" onclick="searchCJ(1)" id="searchBtn">Search</button>
        </div>
        <div id="cjResults"></div>
      </div>

      <!-- My Products tab -->
      <div id="tabProducts" class="tab-content">
        <div class="section-head">
          <h2>Store Products <span id="productCount" style="color:var(--muted);font-weight:400;font-size:0.85rem"></span></h2>
          <button class="btn btn-accent btn-sm" onclick="openAddManualModal()">+ Add Product Manually</button>
        </div>
        <div class="products-table-wrap">
          <div id="productsTable" class="loading">Loading products…</div>
        </div>
      </div>
    </div>

    <!-- Add to Store modal -->
    <div class="modal-overlay" id="addModal" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>Add to Store</h2>
        <div class="modal-cj-preview" id="modalCjPreview" style="display:none">
          <img id="modalCjImg" src="" alt="" />
          <div class="preview-info">
            <strong id="modalCjName"></strong>
            <div id="modalCjMeta" style="color:var(--muted)"></div>
          </div>
        </div>
        <div class="modal-grid">
          <div class="field full">
            <label>Product name *</label>
            <input type="text" id="mName" />
          </div>
          <div class="field">
            <label>Category *</label>
            <select id="mCategory">
              <option>Serums</option><option>Cleansers</option><option>Treatments</option>
              <option>Moisturisers</option><option>Toners</option><option>Masks</option>
              <option>Exfoliants</option><option>Tools</option><option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Price (USD) *</label>
            <input type="number" id="mPrice" min="0.01" step="0.01" placeholder="24.99" />
          </div>
          <div class="field">
            <label>Compare-at price (optional)</label>
            <input type="number" id="mOldPrice" min="0" step="0.01" placeholder="34.99" />
          </div>
          <div class="field">
            <label>Skin type</label>
            <input type="text" id="mSkinType" value="All skin types" />
          </div>
          <div class="field">
            <label>Size / quantity</label>
            <input type="text" id="mSize" placeholder="30 ml / 1 fl oz" />
          </div>
          <div class="field">
            <label>Badge (optional)</label>
            <input type="text" id="mBadge" placeholder="New / Best Seller / Sale" />
          </div>
          <div class="field">
            <label>Emoji</label>
            <input type="text" id="mEmoji" value="🍵" />
          </div>
          <div class="field full">
            <label>Image URL</label>
            <input type="url" id="mImage" placeholder="https://…" />
          </div>
          <div class="field">
            <label>CJ Variant ID (cj_vid)</label>
            <input type="text" id="mCjVid" placeholder="auto-filled from CJ" />
          </div>
          <div class="field">
            <label>CJ SKU (cj_sku)</label>
            <input type="text" id="mCjSku" placeholder="auto-filled from CJ" />
          </div>
          <div class="field full">
            <label>Description *</label>
            <textarea id="mDesc" placeholder="Product description…"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="document.getElementById('addModal').classList.remove('open')">Cancel</button>
          <button class="btn btn-primary" onclick="submitAdd()">Add to Store</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
      // ----------------------------------------------------------------
      // State
      // ----------------------------------------------------------------
      let adminKey = '';
      let allProducts = [];
      let cjPage = 1;
      let cjQuery = '';
      let cjTotal = 0;

      // ----------------------------------------------------------------
      // Auth
      // ----------------------------------------------------------------
      (function init() {
        const stored = sessionStorage.getItem('ftAdminKey');
        if (stored) { adminKey = stored; showAdmin(); loadProducts(); }
      })();

      async function login() {
        const pw = document.getElementById('passwordInput').value.trim();
        if (!pw) return;
        const res = await fetch('/api/admin', { headers: { 'x-admin-key': pw } });
        if (res.ok) {
          adminKey = pw;
          sessionStorage.setItem('ftAdminKey', pw);
          const data = await res.json();
          allProducts = data;
          showAdmin();
          renderProductsTable();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') login();
      });

      function logout() {
        sessionStorage.removeItem('ftAdminKey');
        location.reload();
      }

      function showAdmin() {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('adminWrap').style.display = 'block';
      }

      // ----------------------------------------------------------------
      // Tabs
      // ----------------------------------------------------------------
      function showTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tab === 'products' && allProducts.length === 0) loadProducts();
      }

      // ----------------------------------------------------------------
      // My Products
      // ----------------------------------------------------------------
      async function loadProducts() {
        try {
          const res = await fetch('/api/admin', { headers: { 'x-admin-key': adminKey } });
          allProducts = await res.json();
          renderProductsTable();
        } catch (err) {
          document.getElementById('productsTable').innerHTML = `<p style="color:var(--danger)">Failed to load: ${err.message}</p>`;
        }
      }

      function renderProductsTable() {
        const wrap = document.getElementById('productsTable');
        document.getElementById('productCount').textContent = `(${allProducts.length})`;
        if (!allProducts.length) { wrap.innerHTML = '<p class="loading">No products found.</p>'; return; }

        wrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Cat</th>
                <th>Price</th>
                <th>Image URL</th>
                <th>CJ VID</th>
                <th>CJ SKU</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${allProducts.map(p => `
                <tr id="prow-${p.id}">
                  <td>
                    ${p.image
                      ? `<img class="prod-thumb" src="${esc(p.image)}" alt="${esc(p.name)}" />`
                      : `<div class="prod-emoji">${p.emoji || '🍵'}</div>`}
                  </td>
                  <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(p.name)}">${esc(p.name)}</td>
                  <td style="white-space:nowrap;color:var(--muted);font-size:0.78rem">${esc(p.category)}</td>
                  <td style="white-space:nowrap">$${(p.price / 100).toFixed(2)}</td>
                  <td><input class="table-input" data-field="image" data-id="${p.id}" value="${esc(p.image || '')}" placeholder="https://…" /></td>
                  <td><input class="table-input" data-field="cj_vid" data-id="${p.id}" value="${esc(p.cj_vid || '')}" placeholder="CJ variant ID" /></td>
                  <td><input class="table-input" data-field="cj_sku" data-id="${p.id}" value="${esc(p.cj_sku || '')}" placeholder="CJ SKU" /></td>
                  <td>
                    ${!p.active
                      ? '<span class="badge-inactive">Inactive</span>'
                      : (p.cj_vid ? '<span class="badge-mapped">✓ CJ Mapped</span>' : '<span class="badge-unmapped">⚠ No CJ</span>')}
                  </td>
                  <td>
                    <div class="actions-cell">
                      <button class="btn btn-primary btn-sm" onclick="saveProduct(${p.id})">Save</button>
                      <button class="btn ${p.active ? 'btn-danger' : 'btn-ghost'} btn-sm" onclick="toggleProduct(${p.id}, ${!p.active})">${p.active ? 'Hide' : 'Show'}</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      }

      async function saveProduct(id) {
        const row = document.getElementById(`prow-${id}`);
        const image = row.querySelector('[data-field="image"]').value.trim() || null;
        const cj_vid = row.querySelector('[data-field="cj_vid"]').value.trim() || null;
        const cj_sku = row.querySelector('[data-field="cj_sku"]').value.trim() || null;

        const res = await fetch('/api/admin', {
          method: 'PUT',
          headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, image, cj_vid, cj_sku }),
        });

        if (res.ok) {
          const p = allProducts.find(x => x.id === id);
          if (p) { p.image = image; p.cj_vid = cj_vid; p.cj_sku = cj_sku; }
          renderProductsTable();
          toast('Saved!', 'success');
        } else {
          const err = await res.json().catch(() => ({}));
          toast('Save failed: ' + (err.error || res.status), 'error');
        }
      }

      async function toggleProduct(id, active) {
        const res = await fetch('/api/admin', {
          method: 'PUT',
          headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, active }),
        });
        if (res.ok) {
          const p = allProducts.find(x => x.id === id);
          if (p) p.active = active;
          renderProductsTable();
          toast(active ? 'Product activated' : 'Product hidden', 'success');
        } else {
          toast('Update failed', 'error');
        }
      }

      // ----------------------------------------------------------------
      // CJ Search
      // ----------------------------------------------------------------
      async function searchCJ(page) {
        cjQuery = document.getElementById('cjSearchInput').value.trim();
        if (!cjQuery) return;
        cjPage = page || 1;

        const btn = document.getElementById('searchBtn');
        btn.disabled = true;
        btn.textContent = 'Searching…';
        document.getElementById('cjResults').innerHTML = '<p class="no-results">Searching CJ catalog…</p>';

        try {
          const res = await fetch(`/api/cj-search?q=${encodeURIComponent(cjQuery)}&page=${cjPage}`, {
            headers: { 'x-admin-key': adminKey },
          });
          const data = await res.json();

          if (!res.ok) {
            document.getElementById('cjResults').innerHTML = `<p class="no-results" style="color:var(--danger)">${data.error || 'Search failed'}</p>`;
            return;
          }

          cjTotal = data.total || 0;
          renderCJResults(data.products || []);
        } catch (err) {
          document.getElementById('cjResults').innerHTML = `<p class="no-results" style="color:var(--danger)">Error: ${err.message}</p>`;
        } finally {
          btn.disabled = false;
          btn.textContent = 'Search';
        }
      }

      function renderCJResults(products) {
        const wrap = document.getElementById('cjResults');
        if (!products.length) {
          wrap.innerHTML = '<p class="no-results">No products found. Try a different search term.</p>';
          return;
        }

        const grid = products.map((p, i) => `
          <div class="cj-card">
            <img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" onerror="this.style.background='#2a2d3e'" />
            <div class="cj-card-body">
              <div class="cj-cat">${esc(p.categoryName)}</div>
              <h3>${esc(p.name)}</h3>
              <div class="cj-price">From $${esc(String(p.price))}</div>
              ${p.variants.length > 1 ? `
                <select id="variant_${i}">
                  ${p.variants.map(v => `<option value="${esc(v.vid)}" data-sku="${esc(v.sku)}" data-img="${esc(v.image)}" data-price="${esc(String(v.price))}">${esc(v.name)} — $${esc(String(v.price))}</option>`).join('')}
                </select>` : `<input type="hidden" id="variant_${i}" value="${esc(p.variants[0]?.vid || '')}" />`}
              <button class="btn btn-accent btn-sm" onclick="openAddModal(${i}, ${JSON.stringify(p).replace(/</g,'\\u003c')})">+ Add to Store</button>
            </div>
          </div>`).join('');

        const pages = Math.ceil(cjTotal / 20);
        const pagination = pages > 1 ? `
          <div class="pagination">
            ${cjPage > 1 ? `<button class="btn btn-ghost btn-sm" onclick="searchCJ(${cjPage - 1})">← Prev</button>` : ''}
            <span style="color:var(--muted);font-size:0.82rem">Page ${cjPage} of ${pages} (${cjTotal} results)</span>
            ${cjPage < pages ? `<button class="btn btn-ghost btn-sm" onclick="searchCJ(${cjPage + 1})">Next →</button>` : ''}
          </div>` : '';

        wrap.innerHTML = `<div class="cj-grid">${grid}</div>${pagination}`;
      }

      // ----------------------------------------------------------------
      // Add to Store modal
      // ----------------------------------------------------------------
      function openAddModal(idx, cjProduct) {
        const variantEl = document.getElementById(`variant_${idx}`);
        const vid = variantEl?.value || '';
        const selectedOpt = variantEl?.options?.[variantEl.selectedIndex];
        const variantSku = selectedOpt?.dataset?.sku || cjProduct.variants?.[0]?.sku || '';
        const variantImg = selectedOpt?.dataset?.img || cjProduct.image;
        const variantPrice = selectedOpt?.dataset?.price || cjProduct.price;

        // Pre-fill modal
        document.getElementById('mName').value = cjProduct.name;
        document.getElementById('mDesc').value = '';
        document.getElementById('mImage').value = variantImg || '';
        document.getElementById('mCjVid').value = vid;
        document.getElementById('mCjSku').value = variantSku;
        document.getElementById('mPrice').value = variantPrice || '';
        document.getElementById('mOldPrice').value = '';
        document.getElementById('mBadge').value = '';
        document.getElementById('mEmoji').value = '🍵';
        document.getElementById('mSize').value = '';
        document.getElementById('mSkinType').value = 'All skin types';

        // CJ preview
        document.getElementById('modalCjImg').src = variantImg || cjProduct.image;
        document.getElementById('modalCjName').textContent = cjProduct.name;
        document.getElementById('modalCjMeta').textContent = `CJ VID: ${vid || 'n/a'}  |  CJ SKU: ${variantSku || 'n/a'}`;
        document.getElementById('modalCjPreview').style.display = 'flex';

        document.getElementById('addModal').classList.add('open');
      }

      function openAddManualModal() {
        ['mName','mDesc','mImage','mCjVid','mCjSku','mPrice','mOldPrice','mBadge','mSize'].forEach(id => {
          document.getElementById(id).value = '';
        });
        document.getElementById('mEmoji').value = '🍵';
        document.getElementById('mSkinType').value = 'All skin types';
        document.getElementById('modalCjPreview').style.display = 'none';
        document.getElementById('addModal').classList.add('open');
      }

      function closeModal(e) {
        if (e.target === document.getElementById('addModal')) {
          document.getElementById('addModal').classList.remove('open');
        }
      }

      async function submitAdd() {
        const payload = {
          name: document.getElementById('mName').value.trim(),
          category: document.getElementById('mCategory').value,
          price: parseFloat(document.getElementById('mPrice').value),
          old_price: parseFloat(document.getElementById('mOldPrice').value) || null,
          description: document.getElementById('mDesc').value.trim(),
          size: document.getElementById('mSize').value.trim(),
          skin_type: document.getElementById('mSkinType').value.trim(),
          badge: document.getElementById('mBadge').value.trim() || null,
          emoji: document.getElementById('mEmoji').value.trim() || '🍵',
          image: document.getElementById('mImage').value.trim() || null,
          cj_vid: document.getElementById('mCjVid').value.trim() || null,
          cj_sku: document.getElementById('mCjSku').value.trim() || null,
        };

        if (!payload.name || !payload.price) {
          toast('Name and price are required', 'error'); return;
        }

        const res = await fetch('/api/admin', {
          method: 'POST',
          headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (res.ok) {
          const newProduct = await res.json();
          allProducts.push(newProduct);
          document.getElementById('addModal').classList.remove('open');
          toast(`"${payload.name}" added to store!`, 'success');
          // Reload to get latest from Supabase
          await loadProducts();
        } else {
          const err = await res.json().catch(() => ({}));
          toast('Add failed: ' + (err.error || res.status), 'error');
        }
      }

      // ----------------------------------------------------------------
      // Utilities
      // ----------------------------------------------------------------
      function esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      let toastTimer;
      function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
      }
    </script>
  </body>
</html>
